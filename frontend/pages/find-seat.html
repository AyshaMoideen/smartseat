<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Find My Seat | SmartSeat</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="../css/find-seat.css">

</head>

<body>

    <!-- Header -->

    <header class="header">

        <div class="container">

            <a href="../index.html" class="back-btn">
    <i class="bi bi-arrow-left"></i> Back to Home
</a>

            <h1>SMARTSEAT</h1>

            <p>Malik Deenar College of Graduate Studies</p>

        </div>

    </header>

    <!-- Search -->

    <section class="search-section">

        <div class="search-card">

            <div class="icon">
                <i class="bi bi-search"></i>
            </div>

            <h2>Find Your Examination Seat</h2>

            <p>Enter your Register Number below.</p>

            <input
                type="text"
                id="registerNumber"
                class="form-control"
                placeholder="Example: CS20240015">

            <button id="searchBtn" class="btn btn-primary">

                <i class="bi bi-search"></i>

                Find My Seat

            </button>

        </div>

    </section>

    <!-- Result -->

    <section id="resultSection" class="result-section">

        <div class="ticket">

            <div class="ticket-header">

                <h3>EXAMINATION HALL TICKET</h3>

                <small>SmartSeat Examination Management System</small>

            </div>

            <div class="ticket-body">

                <div class="row">

                    <div class="col-md-6 info">

                        <label>Student Name</label>
                        <p id="studentName">-</p>

                    </div>

                    <div class="col-md-6 info">

                        <label>Register Number</label>
                        <p id="studentReg">-</p>

                    </div>

                    <div class="col-md-6 info">

                        <label>Department</label>
                        <p id="studentDept">-</p>

                    </div>

                    <div class="col-md-6 info">

                        <label>Examination</label>
                        <p id="studentExam">-</p>

                    </div>

                    <div class="col-md-4 info">

                        <label>Room</label>
                        <p id="studentRoom">-</p>

                    </div>

                    <div class="col-md-4 info">

                        <label>Bench</label>
                        <p id="studentBench">-</p>

                    </div>

                    <div class="col-md-4 info">

                        <label>Seat</label>
                        <p id="studentSeat">-</p>

                    </div>

                    <div class="col-md-6 info">

                        <label>Date</label>
                        <p id="studentDate">-</p>

                    </div>

                    <div class="col-md-6 info">

                        <label>Time</label>
                        <p id="studentTime">-</p>

                    </div>

                </div>

            </div>

            <div class="ticket-footer">

                <p>

                    <i class="bi bi-stars"></i>

                    Best of Luck for Your Examination!

                </p>

                <div class="buttons">

                    <button id="printBtn" class="btn btn-success">

                        <i class="bi bi-printer"></i>

                        Print Hall Ticket

                    </button>

                    <button id="resetBtn" class="btn btn-outline-primary">

                        <i class="bi bi-arrow-clockwise"></i>

                        Search Again

                    </button>

                </div>

            </div>

        </div>

    </section>

    <script src="../js/storage.js"></script>
    <script src="../js/find-seat.js"></script>

</body>

</html>
