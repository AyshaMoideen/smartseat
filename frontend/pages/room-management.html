<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Room Management | SmartSeat</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="../css/room-management.css">

</head>

<body>

<div class="container-fluid">

<div class="row">

<!-- Sidebar -->

<div class="col-lg-2 sidebar">

<h2>SMARTSEAT</h2>

<ul>

<li onclick="location.href='dashboard.html'">
<i class="bi bi-speedometer2"></i>
Dashboard
</li>

<li onclick="location.href='manage-students.html'">
<i class="bi bi-people-fill"></i>
Students
</li>

<li class="active">
<i class="bi bi-building"></i>
Rooms
</li>

<li onclick="location.href='create-exam.html'">
<i class="bi bi-grid"></i>
Create Exam
</li>

<li>
<i class="bi bi-file-earmark-pdf"></i>
Reports
</li>

</ul>

</div>

<!-- Main -->

<div class="col-lg-10 main">

<h1>Room Management</h1>

<p>Create rooms for seating allocation.</p>

<div class="card">

<div class="card-header">

Add Room

</div>

<div class="card-body">

<form id="roomForm">

<div class="row">

<div class="col-md-4">

<label>Building</label>

<input
type="text"
id="building"
class="form-control">

</div>

<div class="col-md-2">

<label>Floor</label>

<input
type="number"
id="floor"
class="form-control">

</div>

<div class="col-md-2">

<label>Room</label>

<input
type="text"
id="room"
class="form-control">

</div>

<div class="col-md-2">

<label>Benches</label>

<input
type="number"
id="benches"
class="form-control">

</div>

<div class="col-md-2">

<label>Seats / Bench</label>

<input
type="number"
id="seat"
value="3"
class="form-control">

</div>

</div>

<div class="mt-4">

<button class="btn btn-primary">

<i class="bi bi-plus-circle"></i>

Add Room

</button>

</div>

</form>

</div>

</div>

<div class="card mt-4">

<div class="card-header">

Room List

</div>

<div class="card-body">

<input
type="text"
id="searchRoom"
class="form-control mb-3"
placeholder="Search Room...">

<table class="table table-striped">

<thead>

<tr>

<th>Building</th>
<th>Floor</th>
<th>Room</th>
<th>Benches</th>
<th>Seats</th>
<th>Capacity</th>
<th>Action</th>

</tr>

</thead>

<tbody id="roomTable">

</tbody>

</table>

</div>

</div>

<div class="stats">

<div class="stat-card">

<h2 id="roomCount">0</h2>

<p>Total Rooms</p>

</div>

<div class="stat-card">

<h2 id="capacityCount">0</h2>

<p>Total Capacity</p>

</div>

</div>

</div>

</div>

</div>

<script src="../js/room-management.js"></script>

</body>

</html>
