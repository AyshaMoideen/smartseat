<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Rooms | SmartSeat</title>

<!-- Bootstrap -->

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<!-- Bootstrap Icons -->

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
rel="stylesheet">

<!-- Google Fonts -->

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet" href="../css/layout.css">

<link rel="stylesheet" href="../css/rooms.css">

</head>

<body>

<!-- ===========================
Room Modal
=========================== -->

<div class="modal fade"
id="roomModal"
tabindex="-1">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">

<h4 class="modal-title">

<i class="bi bi-building-fill-add"></i>

Add Room

</h4>

<button
class="btn-close"
data-bs-dismiss="modal">
</button>

</div>

<div class="modal-body">

<div class="mb-3">

<label>

Room Number

</label>

<input
type="text"
id="roomName"
class="form-control"
placeholder="Example : Room 101">

</div>

<div class="mb-3">

<label>

Capacity

</label>

<input
type="number"
id="roomCapacity"
class="form-control"
placeholder="30">

</div>

</div>

<div class="modal-footer">

<button
class="btn btn-secondary"
data-bs-dismiss="modal">

Cancel

</button>

<button
id="saveRoomBtn"
class="btn btn-primary">

Save Room

</button>

</div>

</div>

</div>

</div>

<!-- Sidebar -->

<div id="sidebar"></div>

<!-- Main -->

<div class="main">

<div id="topbar"></div>

<div class="rooms-container">

<div class="header-section">

<div>

<h2>

Room Management

</h2>

<p>

Manage examination rooms and seating capacity.

</p>

</div>

<button
id="addRoomBtn"
class="btn btn-primary">

<i class="bi bi-plus-circle-fill"></i>

Add Room

</button>

</div>

<!-- Statistics -->

<div class="stats-grid">

<div class="stat-card">

<i class="bi bi-building-fill"></i>

<h3 id="totalRooms">

0

</h3>

<p>

Rooms

</p>

</div>

<div class="stat-card">

<i class="bi bi-grid-fill"></i>

<h3 id="totalCapacity">

0

</h3>

<p>

Capacity

</p>

</div>

<div class="stat-card">

<i class="bi bi-check-circle-fill"></i>

<h3 id="occupiedRooms">

0

</h3>

<p>

Occupied

</p>

</div>

<div class="stat-card">

<i class="bi bi-door-open-fill"></i>

<h3 id="availableRooms">

0

</h3>

<p>

Available

</p>

</div>

</div>

<!-- Search -->

<div class="search-box">

<input
type="text"
id="searchRoom"
class="form-control"
placeholder="Search Room">

</div>

<!-- Table -->

<div class="table-responsive">

<table class="table table-hover">

<thead>

<tr>

<th>Room</th>

<th>Capacity</th>

<th width="150">

Action

</th>

</tr>

</thead>

<tbody id="roomTable">

</tbody>

</table>

</div>

<!-- ===========================
     Room Summary
=========================== -->

<div class="summary-card mt-5">

    <h4>

        <i class="bi bi-bar-chart-fill"></i>

        Room Summary

    </h4>

    <hr>

    <div class="row">

        <div class="col-md-6">

            <p>

                <strong>Total Rooms :</strong>

                <span id="summaryRooms">

                    0

                </span>

            </p>

            <p>

                <strong>Total Capacity :</strong>

                <span id="summaryCapacity">

                    0

                </span>

            </p>

        </div>

        <div class="col-md-6">

            <p>

                <strong>Occupied Rooms :</strong>

                <span id="summaryOccupied">

                    0

                </span>

            </p>

            <p>

                <strong>Available Rooms :</strong>

                <span id="summaryAvailable">

                    0

                </span>

            </p>

        </div>

    </div>

</div>

<!-- ===========================
     Quick Actions
=========================== -->

<div class="action-card mt-4">

    <h4>

        <i class="bi bi-lightning-charge-fill"></i>

        Quick Actions

    </h4>

    <div class="d-flex flex-wrap gap-3 mt-3">

        <button
            id="exportRoomsBtn"
            class="btn btn-success">

            <i class="bi bi-download"></i>

            Export Rooms

        </button>

        <button
            id="clearRoomsBtn"
            class="btn btn-outline-danger">

            <i class="bi bi-trash-fill"></i>

            Clear All Rooms

        </button>

    </div>

</div>

</div>

</div>

<!-- ===========================
     Bootstrap JS
=========================== -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- ===========================
     SweetAlert2
=========================== -->

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- ===========================
     SmartSeat Scripts
=========================== -->

<script src="../js/storage.js"></script>

<script src="../js/activity.js"></script>

<script src="../js/layout.js"></script>

<script src="../js/alert-manager.js"></script>

<script src="../js/rooms.js"></script>

</body>

</html>
