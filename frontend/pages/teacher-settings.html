<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Settings | SmartSeat</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Shared Layout -->
    <link rel="stylesheet" href="../css/layout.css">

    <!-- Page CSS -->
    <link rel="stylesheet" href="../css/teacher-settings.css">
</head>

<body>

    <!-- Shared Sidebar -->
    <div id="sidebar"></div>

    <!-- Main Content -->
    <div class="main">

        <!-- Shared Topbar -->
        <div id="topbar"></div>

        <!-- Page Header -->
        <div class="page-header">
            <h2>Account Settings</h2>
            <p>Manage your account information and security.</p>
        </div>

        <!-- Settings Card -->
        <div class="settings-card">

            <h3>Personal Information</h3>

            <form id="profileForm">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="name" value="Dr. Kareem Abdul Rahman">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" value="kareem@mdcgs.edu.in">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Phone</label>
                        <input type="text" class="form-control" id="phone" value="+91 9876543210">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Department</label>
                        <input type="text" class="form-control" id="department" value="Computer Science">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Qualification</label>
                        <input type="text" class="form-control" id="qualification" value="Ph.D Computer Science">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Office Room</label>
                        <input type="text" class="form-control" id="office" value="B-204">
                    </div>

                    <div class="col-12 mb-4">
                        <label class="form-label">Address</label>
                        <textarea class="form-control" id="address" rows="4">Malik Deenar College of Graduate Studies</textarea>
                    </div>

                </div>

                <h3 class="section-title">Security</h3>

                <div class="row">

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Current Password</label>
                        <input type="password" class="form-control">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">New Password</label>
                        <input type="password" class="form-control">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" class="form-control">
                    </div>

                </div>

                <div class="action-buttons">
                    <button type="reset" class="btn btn-outline-secondary">
                        Cancel
                    </button>

                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-circle"></i>
                        Save Changes
                    </button>
                </div>

            </form>

        </div>

    </div>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Shared JS -->
    <script src="../js/storage.js"></script>
    <script src="../js/activity.js"></script>
    <script src="../js/layout.js"></script>

    <!-- Page JS -->
    <script src="../js/teacher-settings.js"></script>

</body>

</html>
