<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teacher Login | SmartSeat</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../css/teacher-login.css">

</head>

<body>

<div class="login-container">

<div class="left-side">

<div class="overlay">

<img src="../assets/images/college-logo.png" class="college-logo">

<h1>SMARTSEAT</h1>

<h4>Examination Seating Management System</h4>

<p>

Malik Deenar College of Graduate Studies

</p>

<div class="features">

<div>

<i class="bi bi-check-circle-fill"></i>

Automatic Seating Allocation

</div>

<div>

<i class="bi bi-check-circle-fill"></i>

PDF Report Generation

</div>

<div>

<i class="bi bi-check-circle-fill"></i>

Student Seat Finder

</div>

<div>

<i class="bi bi-check-circle-fill"></i>

Teacher Dashboard

</div>

</div>

</div>

</div>

<div class="right-side">

<div class="login-box">

<h2>

Teacher Login

</h2>

<p>

Login to continue

</p>

<form id="loginForm">

<div class="mb-4">

<label>

Teacher ID

</label>

<input
type="text"
id="teacherId"
class="form-control"
placeholder="Enter Teacher ID">

</div>

<div class="mb-4">

<label>

Password

</label>

<div class="password-box">

<input
type="password"
id="teacherPassword"
class="form-control"
placeholder="Enter Password">

<i
class="bi bi-eye"
id="togglePassword">

</i>

</div>

</div>

<div class="d-flex justify-content-between mb-4">

<div>

<input type="checkbox">

Remember Me

</div>

<a href="#">

Forgot Password?

</a>

</div>

<button
type="submit"
id="loginBtn"
class="login-btn">

LOGIN

</button>

</form>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="../js/teacher-login.js"></script>

</body>

</html>
