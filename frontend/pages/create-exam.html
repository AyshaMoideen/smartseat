<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Examination | SmartSeat</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../css/layout.css">

<link rel="stylesheet" href="../css/create-exam.css">

</head>

<body>

<div id="sidebar"></div>

<div class="main">

<div id="topbar"></div>

<div class="exam-container">

<div class="header-section">

<div>

<h2>Create Examination</h2>

<p>

Create and manage semester examinations.

</p>

</div>

<button

id="clearExamBtn"

class="btn btn-outline-danger">

<i class="bi bi-trash-fill"></i>

Clear All

</button>

</div>

<div class="stats-grid">

<div class="stat-card">

<i class="bi bi-journal-text"></i>

<h3 id="totalExams">0</h3>

<p>Total Exams</p>

</div>

<div class="stat-card">

<i class="bi bi-calendar-check-fill"></i>

<h3 id="todayExams">0</h3>

<p>Today's Exams</p>

</div>

<div class="stat-card">

<i class="bi bi-clock-fill"></i>

<h3 id="upcomingExams">0</h3>

<p>Upcoming</p>

</div>

<div class="stat-card">

<i class="bi bi-mortarboard-fill"></i>

<h3 id="departmentCount">0</h3>

<p>Semesters</p>

</div>

</div>

 <!-- ==========================================
     Create Exam Form
========================================== -->

<div class="form-card">

<h4>

<i class="bi bi-journal-plus"></i>

Create Examination

</h4>

<hr>

<div class="row">

<div class="col-md-6 mb-3">

<label>

Exam Name

</label>

<input

type="text"

id="examName"

class="form-control"

placeholder="Internal Examination">

</div>

<div class="col-md-6 mb-3">

<label>

Semester

</label>

<select

id="examSemester"

class="form-select">

<option value="">Select Semester</option>

<option>1</option>

<option>2</option>

<option>3</option>

<option>4</option>

<option>5</option>

<option>6</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>

Date

</label>

<input

type="date"

id="examDate"

class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>

Start Time

</label>

<input

type="time"

id="startTime"

class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>

End Time

</label>

<input

type="time"

id="endTime"

class="form-control">

</div>

</div>

<div class="text-end mt-3">

<button

id="saveExamBtn"

class="btn btn-primary">

<i class="bi bi-check-circle-fill"></i>

Save Examination

</button>

</div>

</div>

<!-- ==========================================
     Search
========================================== -->

<div class="search-box">

<input

type="text"

id="searchExam"

class="form-control"

placeholder="Search Examination...">

</div>

<!-- ==========================================
     Exam Table
========================================== -->

<div class="table-card">

<h4>

<i class="bi bi-table"></i>

Examination List

</h4>

<div class="table-responsive">

<table class="table table-hover">

<thead>

<tr>

<th>Exam</th>

<th>Semester</th>

<th>Date</th>

<th>Time</th>

<th>Room</th>

<th>Action</th>

</tr>

</thead>

<tbody id="examTable">

<tr>

<td colspan="6"

class="text-center">

No Exams Created

</td>

</tr>

</tbody>

</table>

</div>

</div>

<!-- ==========================================
     Summary
========================================== -->

<div class="summary-card">

<h4>

Summary

</h4>

<hr>

<div class="row">

<div class="col-md-3">

<h3 id="summaryTotal">0</h3>

<p>Total Exams</p>

</div>

<div class="col-md-3">

<h3 id="summaryToday">0</h3>

<p>Today</p>

</div>

<div class="col-md-3">

<h3 id="summaryUpcoming">0</h3>

<p>Upcoming</p>

</div>

<div class="col-md-3">

<h3 id="summaryDepartments">0</h3>

<p>Semesters</p>

</div>

</div>

</div>


<!-- ==========================================
     Quick Actions
========================================== -->

<div class="action-card">

<h4>

Quick Actions

</h4>

<div class="d-flex gap-3 mt-3 flex-wrap">

<button

id="exportExamBtn"

class="btn btn-success">

Export Excel

</button>

<button

id="clearExamBtnBottom"

class="btn btn-outline-danger">

Clear All

</button>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script src="../js/storage.js"></script>

<script src="../js/activity.js"></script>

<script src="../js/layout.js"></script>

<script src="../js/alert-manager.js"></script>

<script src="../js/create-exam.js"></script>

</body>

</html>

</body>

</html>
