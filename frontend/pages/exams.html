<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Create Exam | SmartSeat</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="../css/create-exam.css">

</head>

<body>

<div class="container-fluid">

<div class="row">

<!-- Sidebar -->

<div class="col-lg-2 sidebar">

<h2>SMARTSEAT</h2>

<ul>

<li onclick="location.href='dashboard.html'">
<i class="bi bi-speedometer2"></i>
Dashboard
</li>

<li onclick="location.href='manage-students.html'">
<i class="bi bi-people-fill"></i>
Students
</li>

<li onclick="location.href='room-management.html'">
<i class="bi bi-building"></i>
Rooms
</li>

<li class="active">
<i class="bi bi-grid"></i>
Create Exam
</li>

<li onclick="location.href='reports.html'">
<i class="bi bi-file-earmark-pdf"></i>
Reports
</li>

</ul>

</div>

<!-- Main -->

<div class="col-lg-10 main">

<h1>Create Examination</h1>

<p>Configure the examination before generating seating.</p>

<div class="card">

<div class="card-header">

Exam Information

</div>

<div class="card-body">

<form id="examForm">

<div class="row">

<div class="col-md-6">

<label>Exam Name</label>

<input
type="text"
id="examName"
class="form-control"
placeholder="Mid Semester Examination">

</div>

<div class="col-md-3">

<label>Date</label>

<input
type="date"
id="examDate"
class="form-control">

</div>

<div class="col-md-3">

<label>Time</label>

<input
type="time"
id="examTime"
class="form-control">

</div>

</div>

<br>

<div class="row">

<div class="col-md-4">

<label>Semester</label>

<select
id="semester"
class="form-select">

<option value="">Choose</option>

<option>Semester 1</option>
<option>Semester 2</option>
<option>Semester 3</option>
<option>Semester 4</option>
<option>Semester 5</option>
<option>Semester 6</option>

</select>

</div>

<div class="col-md-4">

<label>Maximum Students / Bench</label>

<select
id="seatPerBench"
class="form-select">

<option>3</option>

</select>

</div>

<div class="col-md-4">

<label>Mix Departments</label>

<select
id="mixDept"
class="form-select">

<option value="yes">

Yes

</option>

<option value="no">

No

</option>

</select>

</div>

</div>

<br>

<div class="row">

<div class="col-md-12">

<label>Instructions</label>

<textarea
id="instructions"
rows="4"
class="form-control"
placeholder="Exam Instructions..."></textarea>

</div>

</div>

<br>

<button
class="btn btn-primary">

<i class="bi bi-check-circle"></i>

Save Exam

</button>

<button
type="button"
id="generateBtn"
class="btn btn-success ms-2">

<i class="bi bi-cpu"></i>

Generate Seating

</button>

</form>

</div>

</div>

<div class="stats">

<div class="stat-card">

<h2 id="departmentTotal">0</h2>

<p>Departments</p>

</div>

<div class="stat-card">

<h2 id="roomTotal">0</h2>

<p>Rooms</p>

</div>

<div class="stat-card">

<h2 id="studentTotal">0</h2>

<p>Students</p>

</div>

</div>

</div>

</div>

</div>

<script src="../js/create-exam.js"></script>

</body>

</html>
